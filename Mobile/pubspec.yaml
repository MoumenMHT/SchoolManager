name: schoolhub_parent
description: "SchoolHub Parent Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
